# System Configuration for SSH Brute-Force Detection System

api:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5601"

elasticsearch:
  hosts:
    - "http://localhost:9200"
  index_prefix: ssh-auth-logs
  timeout: 30

kibana:
  host: "http://localhost:5601"

redis:
  host: localhost
  port: 6379
  db: 0
  stream_key: ssh_anomaly_scores
  alert_channel: ssh_alerts

detection:
  log_path: /var/log/auth.log
  poll_interval: 1  # seconds
  window_minutes: 5
  scoring_interval: 60  # seconds

alerts:
  email:
    enabled: true
    smtp_host: smtp.gmail.com
    smtp_port: 587
    use_tls: true
    # Credentials from environment variables
    # SMTP_USER, SMTP_PASSWORD, ALERT_EMAIL_TO
  websocket:
    enabled: true

fail2ban:
  enabled: true
  jail_name: sshd-ai
  ban_time: 3600  # 1 hour
  find_time: 600  # 10 minutes
  max_retry: 5
  auto_ban_on_critical: true
  manual_confirm_on_warning: true

paths:
  dataset_dir: ./Dataset
  model_dir: ./trained_models
  log_dir: ./logs
  output_dir: ./output
