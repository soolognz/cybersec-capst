# Logstash Pipeline for SSH Authentication Log Processing
# Parses syslog-format SSH logs, enriches with GeoIP, and outputs to Elasticsearch

input {
  beats {
    port => 5044
  }

  file {
    path => "/var/log/auth.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "auth_log"
  }
}

filter {
  # Parse ISO8601 syslog format
  grok {
    match => {
      "message" => "%{TIMESTAMP_ISO8601:log_timestamp}\s+%{HOSTNAME:log_host}\s+%{WORD:service}\[%{NUMBER:pid:int}\]:\s+%{GREEDYDATA:log_message}"
    }
  }

  date {
    match => ["log_timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Classify SSH events
  if [service] == "sshd" {
    # Failed password
    if "Failed password" in [log_message] {
      mutate { add_field => { "event_type" => "failed_password" } }

      grok {
        match => {
          "log_message" => "Failed password for (?:invalid user )?%{USERNAME:ssh_user} from %{IP:source_ip} port %{NUMBER:source_port:int}"
        }
        tag_on_failure => ["_grok_ssh_fail"]
      }

      if "invalid user" in [log_message] {
        mutate { add_field => { "is_invalid_user" => true } }
      } else {
        mutate { add_field => { "is_invalid_user" => false } }
      }
    }

    # Accepted password
    else if "Accepted" in [log_message] {
      mutate { add_field => { "event_type" => "accepted_password" } }

      grok {
        match => {
          "log_message" => "Accepted %{WORD:auth_method} for %{USERNAME:ssh_user} from %{IP:source_ip} port %{NUMBER:source_port:int}"
        }
        tag_on_failure => ["_grok_ssh_accept"]
      }
    }

    # Invalid user
    else if "Invalid user" in [log_message] {
      mutate { add_field => { "event_type" => "invalid_user" } }

      grok {
        match => {
          "log_message" => "Invalid user %{USERNAME:ssh_user} from %{IP:source_ip} port %{NUMBER:source_port:int}"
        }
        tag_on_failure => ["_grok_ssh_invalid"]
      }
    }

    # Connection events
    else if "Connection" in [log_message] or "Disconnected" in [log_message] {
      mutate { add_field => { "event_type" => "connection_event" } }

      grok {
        match => {
          "log_message" => "(?:Connection (?:from|closed by|reset by)|Disconnected from).*?%{IP:source_ip} port %{NUMBER:source_port:int}"
        }
        tag_on_failure => ["_grok_ssh_conn"]
      }
    }

    # PAM authentication failure
    else if "authentication failure" in [log_message] {
      mutate { add_field => { "event_type" => "pam_auth_failure" } }

      grok {
        match => {
          "log_message" => ".*rhost=%{IP:source_ip}(?:\s+user=%{USERNAME:ssh_user})?"
        }
        tag_on_failure => ["_grok_pam"]
      }
    }

    # Session events
    else if "session opened" in [log_message] or "session closed" in [log_message] {
      mutate { add_field => { "event_type" => "session_event" } }
    }

    # Default
    else {
      mutate { add_field => { "event_type" => "other" } }
    }

    # GeoIP enrichment for source IPs
    if [source_ip] {
      geoip {
        source => "source_ip"
        target => "geo"
        database => "/usr/share/GeoIP/GeoLite2-City.mmdb"
        tag_on_failure => ["_geoip_lookup_failure"]
      }
    }
  }

  # Remove unnecessary fields
  mutate {
    remove_field => ["log_timestamp", "host", "agent"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "ssh-auth-logs-%{+YYYY.MM.dd}"
    template_name => "ssh-auth-logs"
  }

  # Debug output (remove in production)
  # stdout { codec => rubydebug }
}
