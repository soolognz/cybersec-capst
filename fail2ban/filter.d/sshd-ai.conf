# Fail2Ban filter for AI-detected SSH brute-force attacks
# Works with the AI detection system's custom log output

[Definition]
# Match AI system alert log entries
failregex = ^.*AI-ALERT.*source_ip=<HOST>.*threat_level=critical.*$
            ^.*CRITICAL.*Brute-force attack detected from <HOST>.*$

# Ignore legitimate logins
ignoreregex = ^.*Accepted.*$

[Init]
# Maximum number of lines to buffer
maxlines = 1
